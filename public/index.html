<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OTM Docs API</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; line-height: 1.6; padding: 0 1rem; }
    code { background: #f2f2f2; padding: 0.15rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>OTM Documentation API</h1>
  <p>A self-updating JSON mirror of the Oracle OTM online help.</p>
  <ul>
    <li><code>/api/docs</code> &mdash; paginated full dump</li>
    <li><code>/api/docs?q=agent+action</code> &mdash; search</li>
    <li><code>/api/docs?url=&lt;page url&gt;</code> &mdash; single page</li>
  </ul>
</body>
</html>
